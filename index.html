<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./src/assets/filamu_logo_gold_v2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Filamu Times Premium</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'red';
        div.style.color = 'white';
        div.style.zIndex = '99999';
        div.style.padding = '20px';
        div.style.fontSize = '14px';
        div.style.overflow = 'scroll';
        div.innerHTML = '<h1>JS Error!</h1>' +
                        '<p>Msg: ' + msg + '</p>' +
                        '<p>URL: ' + url + '</p>' +
                        '<p>Line: ' + line + '</p>' +
                        '<pre>' + (error ? error.stack : '') + '</pre>';
        document.body.appendChild(div);
      };
    </script>
  </head>
  <body style="margin: 0; background-color: #000;">
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; color: #FFB800; font-family: sans-serif; text-align: center; padding: 20px;">
        Initializing Filamu Times Experience...
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
